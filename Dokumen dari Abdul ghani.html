<!DOCTYPE html>
<html>
<head>
<title>Toko Online Sederhana</title>

<style>
body{
font-family: Arial, sans-serif;
background-color:#eef2f7;
margin:0;
padding:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

.produk-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:20px;
}

.produk{
background:white;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
width:220px;
text-align:center;
padding:15px;
}

.produk img{
width:100%;
border-radius:10px;
}

.harga{
color:green;
font-weight:bold;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#219150;
}

form{
background:white;
width:300px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

input, select{
width:100%;
padding:8px;
margin:5px 0 10px 0;
}
</style>
</head>

<body>

<header>
<h1>Toko Online Abdul Store</h1>
<p>Belanja Mudah dan Murah</p>
</header>

<div class="container">

<h2 style="text-align:center;">Daftar Produk</h2>

<div class="produk-container">

<div class="produk">
<img src="https://cdn.pixabay.com/photo/2016/11/19/18/06/shoes-1840619_1280.jpg">
<h3>Sepatu Sport</h3>
<p class="harga">Rp200.000</p>
<p>Sepatu nyaman untuk olahraga.</p>
<button>Beli</button>
</div>

<div class="produk">
<img src="https://cdn.pixabay.com/photo/2017/08/06/22/01/backpack-2593093_1280.jpg">
<h3>Tas Sekolah</h3>
<p class="harga">Rp150.000</p>
<p>Tas kuat dan tahan lama.</p>
<button>Beli</button>
</div>

<div class="produk">
<img src="https://cdn.pixabay.com/photo/2016/03/27/21/16/watch-1283249_1280.jpg">
<h3>Jam Tangan</h3>
<p class="harga">Rp120.000</p>
<p>Jam tangan modern dan stylish.</p>
<button>Beli</button>
</div>

</div>

</div>

<h2 style="text-align:center;">Form Pemesanan</h2>

<form>
<label>Nama</label>
<input type="text" placeholder="Masukkan nama">

<label>Alamat</label>
<input type="text" placeholder="Masukkan alamat">

<label>Pilih Produk</label>
<select>
<option>Sepatu Sport</option>
<option>Tas Sekolah</option>
<option>Jam Tangan</option>
</select>

<label>Jumlah</label>
<input type="number">

<button type="submit">Pesan Sekarang</button>
</form>

</body>
</html>
